<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rikki — Calendar</title>
<meta name="description" content="Rikki's circadian calendar — when she's awake, month by month, from real Oura data.">
<style>
/* ── palette ───────────────────────────────────────────────────────────────
   Meal hues are a semantic sky ramp: dawn → morning → midday → sunset → night.
   Validated (scripts/validate_palette.js) light + dark: lightness band, chroma
   floor, normal-vision floor (worst adjacent ΔE 29.0), contrast ≥3:1 all PASS.
   One WARN: green↔red ΔE 7.2 protan — in the 6–8 floor band, legal because the
   colour is REDUNDANT here. The column header names the meal, position is fixed,
   and availability is encoded by dot SIZE, never by hue. No datum is colour-alone.
   ───────────────────────────────────────────────────────────────────────── */
:root{
  color-scheme: light;
  --surface-1:#fcfcfb; --surface-2:#f4f4f2; --rule:#e3e3df;
  --ink-1:#0b0b0b; --ink-2:#52514e; --ink-3:#8a8985;
  --asleep:#c9cbd6; --asleep-edge:#a9adbd;
  --proj:#b9b4d4;
  --now:#2a78d6;                 /* Rikki's blue */
  --m1:#eb6834; --m2:#2a78d6; --m3:#008300; --m4:#e34948; --m5:#4a3aa7;
  --track-h:15px;
}
@media (prefers-color-scheme: dark){
  :root:where(:not([data-theme="light"])){
    color-scheme: dark;
    --surface-1:#1a1a19; --surface-2:#232322; --rule:#3a3a38;
    --ink-1:#ffffff; --ink-2:#c3c2b7; --ink-3:#8a8985;
    --asleep:#3d4152; --asleep-edge:#565b70;
    --proj:#4a4468;
    --now:#3987e5;
    --m1:#d95926; --m2:#3987e5; --m3:#008300; --m4:#e66767; --m5:#9085e9;
  }
}
:root[data-theme="dark"]{
  color-scheme: dark;
  --surface-1:#1a1a19; --surface-2:#232322; --rule:#3a3a38;
  --ink-1:#ffffff; --ink-2:#c3c2b7; --ink-3:#8a8985;
  --asleep:#3d4152; --asleep-edge:#565b70;
  --proj:#4a4468;
  --now:#3987e5;
  --m1:#d95926; --m2:#3987e5; --m3:#008300; --m4:#e66767; --m5:#9085e9;
}

*{box-sizing:border-box}
body{
  margin:0; background:var(--surface-1); color:var(--ink-1);
  font:14px/1.4 ui-sans-serif,-apple-system,"Segoe UI",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--now)}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px}

/* ── nav ── */
nav.site{display:flex;gap:18px;align-items:center;flex-wrap:wrap;
  padding-bottom:14px;border-bottom:1px solid var(--rule);margin-bottom:18px}
nav.site a{color:var(--ink-2);text-decoration:none;font-size:13px}
nav.site a:hover{color:var(--ink-1)}
nav.site a[aria-current]{color:var(--ink-1);font-weight:600}
nav.site .sp{flex:1}
.stale{font-size:12px;color:var(--ink-3)}
.stale.warn{color:var(--m4);font-weight:600}

/* ── controls ── */
.bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
h1{font-size:22px;margin:0;font-weight:650;letter-spacing:-.01em}
h1 .yr{color:var(--ink-3);font-weight:400}
button{
  font:inherit;font-size:13px;padding:5px 11px;border:1px solid var(--rule);
  border-radius:7px;background:var(--surface-1);color:var(--ink-1);cursor:pointer;
}
button:hover{background:var(--surface-2)}
button[aria-pressed="true"]{background:var(--ink-1);color:var(--surface-1);border-color:var(--ink-1)}
button:disabled{opacity:.35;cursor:default}
.seg{display:flex;gap:0}
.seg button{border-radius:0;border-left-width:0}
.seg button:first-child{border-radius:7px 0 0 7px;border-left-width:1px}
.seg button:last-child{border-radius:0 7px 7px 0}
.note{font-size:12px;color:var(--ink-3);margin:2px 0 14px}

/* ── grid ── */
table{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
th{font-size:9.5px;font-weight:600;letter-spacing:.055em;text-transform:uppercase;
   color:var(--ink-2);padding:0 4px 5px;vertical-align:bottom;text-align:center}
th.l{text-align:left}th.r{text-align:right}
td{padding:0;height:21px;border-top:1px solid var(--surface-2)}
tbody tr:nth-child(even){background:var(--surface-2)}
tbody tr.today{background:color-mix(in srgb,var(--now) 9%,transparent)}
.dow{color:var(--ink-3);font-size:11px;padding-left:2px;width:30px}
.dnum{font-weight:600;width:20px;text-align:right;padding-right:5px}
.tm{font-size:11.5px;white-space:nowrap;width:56px}
.tm.r{text-align:right;padding-right:8px}
.dim{color:var(--ink-3)}
.dot{width:26px;text-align:center}
.dot i{display:inline-block;border-radius:50%;vertical-align:middle}
/* availability = SIZE (+opacity). Hue only says which meal — the header says that too. */
.dot i.yes{width:9px;height:9px;opacity:1}
.dot i.no {width:3px;height:3px;opacity:.4}
.m1{background:var(--m1)}.m2{background:var(--m2)}.m3{background:var(--m3)}
.m4{background:var(--m4)}.m5{background:var(--m5)}

/* ── 24h track ── */
.track{position:relative;height:var(--track-h);background:transparent}
td.trackcell{width:auto;padding:0 2px}
.tick{position:absolute;top:0;bottom:0;width:1px;background:var(--rule)}
.seg-sleep{position:absolute;top:2px;bottom:2px;background:var(--asleep);
  border:1px solid var(--asleep-edge);border-radius:3px}
.seg-sleep.proj{
  background:var(--proj);border-color:var(--proj);opacity:.5;
  /* texture, not colour: the measured/projected split must survive greyscale + CVD */
  background-image:repeating-linear-gradient(135deg,transparent 0 3px,rgba(255,255,255,.55) 3px 6px);
}
.seg-sleep .lbl{position:absolute;inset:0;font-size:8px;letter-spacing:.09em;
  color:var(--ink-2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.nowline{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--now);z-index:3}
.nowline::after{content:"";position:absolute;top:-3px;left:-2.5px;width:7px;height:7px;
  border-radius:50%;background:var(--now)}
.axis{position:relative;height:14px;font-size:9.5px;color:var(--ink-3);margin-top:1px}
.axis span{position:absolute;transform:translateX(-50%);white-space:nowrap}

/* ── wake-aligned + spiral ── */
svg{display:block;max-width:100%;height:auto;overflow:visible}
.sp-line{fill:none;stroke:var(--asleep-edge);stroke-width:1}
.sp-arc{fill:none;stroke-linecap:round}

/* ── legend ── */
.legend{display:flex;gap:16px;flex-wrap:wrap;align-items:center;
  font-size:11.5px;color:var(--ink-2);margin:14px 0 0;padding-top:12px;border-top:1px solid var(--rule)}
.legend .k{display:flex;gap:6px;align-items:center}
.legend .sw{width:22px;height:11px;border-radius:3px;background:var(--asleep);border:1px solid var(--asleep-edge)}
.legend .sw.proj{background:var(--proj);border-color:var(--proj);opacity:.5;
  background-image:repeating-linear-gradient(135deg,transparent 0 3px,rgba(255,255,255,.55) 3px 6px)}
.legend .sw.gap{background:transparent;border:1px dashed var(--ink-3)}

.empty{padding:40px;text-align:center;color:var(--ink-3)}
details.tbl{margin-top:22px;font-size:12px;color:var(--ink-2)}
details.tbl table{font-size:11px}
details.tbl td,details.tbl th{padding:2px 6px;text-align:left;height:auto}
summary{cursor:pointer;color:var(--ink-2)}

@media print{
  @page{size:11in 8.5in;margin:.4in}
  body{background:#fff}
  nav.site,.bar .seg,.pager,details.tbl{display:none}
  .wrap{max-width:none;padding:0}
  tbody tr:nth-child(even){background:#f4f4f2 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .seg-sleep,.dot i{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@media (max-width:760px){
  .dot{width:18px}.tm{width:46px;font-size:10.5px}
  th{font-size:8.5px}
}
</style>
</head>
<body>
<div class="wrap">

<nav class="site">
  <a href="index.html">Dashboard</a>
  <a href="rainbow.html">Rainbow</a>
  <a href="calendar.html" aria-current="page">Calendar</a>
  <span class="sp"></span>
  <span class="stale" id="stale"></span>
</nav>

<div class="bar">
  <h1 id="title">—</h1>
  <span class="sp" style="flex:1"></span>
  <div class="seg pager">
    <button id="prev" title="Previous month">‹</button>
    <button id="today">Today</button>
    <button id="next" title="Next month">›</button>
  </div>
  <div class="seg">
    <button data-view="clock"  aria-pressed="true">Clock</button>
    <button data-view="awake">Aligned to wake</button>
    <button data-view="spiral">The loop</button>
  </div>
</div>
<p class="note" id="note"></p>

<div id="stage"><div class="empty">Loading your data…</div></div>

<div class="legend" id="legend"></div>
<details class="tbl">
  <summary>This month as a table</summary>
  <div id="tbl"></div>
</details>

</div>

<script>
/* ══════════════════════════════════════════════════════════════════════════
   Rikki — Calendar.  Reads data/sleep.json. Contains ZERO inlined records.

   Rules this file obeys (see data/README.md):
     · Measured is solid. Projected is hatched, faded, and labelled. Never mixed.
     · Gaps render as gaps. 19% of nights have no record; none are invented.
     · Per-record `off` decides the wall clock — the time Rikki actually read.
       (Michigan −300/−240 · Montana −360/−420. A fixed frame would be 2h wrong
       for most of this archive. Every view states its frame.)
   ══════════════════════════════════════════════════════════════════════════ */

const H = 3600000, DAY = 86400000;
const MEALS = [
  {k:'Sunrise walk', h:6.0,  c:'m1'},
  {k:'Breakfast',    h:9.0,  c:'m2'},
  {k:'Lunch',        h:12.5, c:'m3'},
  {k:'Dinner',       h:18.0, c:'m4'},
  {k:'Night walk',   h:22.5, c:'m5'},
];
// A gap longer than this between waking and the next sleep means the ring was off —
// not that Rikki was awake for 22 hours. Distinguishes "no data" from "awake".
const MAX_AWAKE_H = 22;

let EP = [];        // sleep episodes {s,e,off,type}
let NIGHTS = [];    // long_sleep only
let TAU = 25.4;     // recomputed from real data below
let LAST = null;    // last measured wake
let view = 'clock', cur = null;

const pad = n => String(n).padStart(2,'0');
const ymKey = d => `${d.y}-${pad(d.m+1)}`;

/* ── time helpers ───────────────────────────────────────────────────────── */
// Offset in effect on a given date: taken from the nearest measured record.
// Interpolating the *timezone* is legitimate (we know where she was); interpolating
// *sleep* would not be.
function offForDay(y, m, d){
  const t = Date.UTC(y, m, d, 12);
  if(!EP.length) return -360;
  let best = EP[0], bd = Infinity;
  for(const e of EP){ const dd = Math.abs(e.s - t); if(dd < bd){ bd = dd; best = e; } }
  return best.off;
}
const dayStartMs = (y,m,d,off) => Date.UTC(y,m,d) - off*60000;
function hhmm(ms, off){
  const w = new Date(ms + off*60000);
  let h = w.getUTCHours(), mi = w.getUTCMinutes();
  const ap = h >= 12 ? 'p' : 'a'; h = h % 12 || 12;
  return `${h}:${pad(mi)}${ap}`;
}

/* ── τ from the data, not from a constant ───────────────────────────────── */
// Least-squares on the last N wakes: wake_n ≈ intercept + τ·n. This is the honest
// number; the site's prose cites 25.357 measured against a 25.40 constant.
function fitTau(nights, N=60){
  const w = nights.slice(-N).map(n => n.e);
  if(w.length < 8) return {tau:25.4, n:0};
  const idx = w.map((t,i) => Math.round((t - w[0]) / (25.4*H)));
  const n = w.length;
  const sx = idx.reduce((a,b)=>a+b,0), sy = w.reduce((a,b)=>a+b,0);
  const sxx = idx.reduce((a,b)=>a+b*b,0), sxy = idx.reduce((a,b,i)=>a+b*w[i],0);
  const slope = (n*sxy - sx*sy) / (n*sxx - sx*sx);
  const tau = slope / H;
  return (tau > 23 && tau < 28) ? {tau, n} : {tau:25.4, n:0};
}

/* ── build a day ────────────────────────────────────────────────────────── */
function buildDay(y, m, d){
  const off = offForDay(y,m,d);
  const ds = dayStartMs(y,m,d,off), de = ds + DAY;
  const over = EP.filter(e => e.e > ds && e.s < de).sort((a,b)=>a.s-b.s);

  // Is this day covered by real observation at all?
  let covered = over.length > 0;
  if(!covered){
    // Awake all day is real data IF a measured wake precedes and a measured sleep
    // follows within a plausible waking span. Otherwise: no data.
    const before = EP.filter(e => e.e <= ds).pop();
    const after  = EP.find(e => e.s >= de);
    covered = !!(before && after && (after.s - before.e) <= MAX_AWAKE_H*H);
  }

  const proj = ds > (LAST ?? 0);
  const segs = over.map(e => ({
    a: Math.max(e.s, ds), b: Math.min(e.e, de), proj: !!e.proj
  }));
  const wakeEp = over.find(e => e.e > ds && e.e <= de);
  const bedEp  = over.find(e => e.s >= ds && e.s < de);

  const asleepAt = t => over.some(e => t >= e.s && t < e.e);
  const avail = MEALS.map(w => (covered || proj) ? !asleepAt(ds + w.h*H) : false);

  return {y,m,d,off,ds,de,segs,covered,proj,avail,
    wake: wakeEp ? wakeEp.e : null, bed: bedEp ? bedEp.s : null};
}

function monthDays(y,m){
  const dim = new Date(Date.UTC(y,m+1,0)).getUTCDate();
  return Array.from({length:dim},(_,i)=>buildDay(y,m,i+1));
}

/* ── projection: extend τ forward, marked ──────────────────────────────── */
function projectForward(untilMs){
  if(!NIGHTS.length) return;
  const last = NIGHTS[NIGHTS.length-1];
  const durs = NIGHTS.slice(-30).map(n => n.e - n.s);
  const tib  = durs.reduce((a,b)=>a+b,0)/durs.length;
  const awake = (TAU*H) - tib;
  let wake = last.e;
  const off = last.off;
  let guard = 0;
  while(wake < untilMs && guard++ < 400){
    const s = wake + awake, e = s + tib;
    EP.push({s, e, off, type:'long_sleep', proj:true});
    wake = e;
  }
  EP.sort((a,b)=>a.s-b.s);
}

/* ── render: clock + wake-aligned ──────────────────────────────────────── */
function renderRows(days){
  const aligned = view === 'awake';
  // Wake-aligned: each row's window starts at that day's wake, so the drift
  // straightens out and the shape of a waking day is comparable across months.
  const rows = days.map(D => {
    let W0, W1;
    if(aligned){
      const anchor = D.wake ?? (D.covered||D.proj ? D.ds + 12*H : null);
      W0 = anchor !== null ? anchor - 2*H : D.ds; W1 = W0 + 26*H;
    } else { W0 = D.ds; W1 = D.de; }
    const span = W1 - W0;
    const px = t => ((t - W0)/span)*100;
    const segs = EP.filter(e => e.e > W0 && e.s < W1).map(e => ({
      l: Math.max(0, px(e.s)), r: Math.min(100, px(e.e)), proj: !!e.proj
    })).filter(s => s.r - s.l > 0.15);
    return {D, segs, W0, W1, px};
  });

  const now = Date.now();
  const th = MEALS.map(w=>`<th title="${w.k} — around ${hhmm(Date.UTC(2020,0,1)+w.h*H,0)}">${w.k.replace(' ','<br>')}</th>`).join('');
  let h = `<table><thead><tr>
    <th class="l" colspan="2"></th><th class="r">Wake up</th>
    ${th}<th class="r">Bedtime</th>
    <th class="l">${aligned ? 'Awake → rest (each row starts at that day’s wake)' : 'Midnight → midnight'}</th>
  </tr></thead><tbody>`;

  for(const {D, segs, W0, W1, px} of rows){
    const isToday = now >= D.ds && now < D.de;
    const dow = new Date(Date.UTC(D.y,D.m,D.d)).toLocaleDateString('en-US',{weekday:'short',timeZone:'UTC'});
    const dash = '<span class="dim">—</span>';
    const none = !D.covered && !D.proj;

    const dots = D.avail.map((a,i) =>
      `<td class="dot">${none ? '' :
        `<i class="${MEALS[i].c} ${a?'yes':'no'}" title="${MEALS[i].k}: ${a?'probably around':'probably asleep'}"></i>`}</td>`).join('');

    let bars = '';
    if(!aligned) for(let hh=4; hh<24; hh+=4) bars += `<div class="tick" style="left:${(hh/24)*100}%"></div>`;
    for(const s of segs){
      const w = s.r - s.l;
      bars += `<div class="seg-sleep${s.proj?' proj':''}" style="left:${s.l}%;width:${w}%">`
            + (w > 11 ? `<span class="lbl">${s.proj?'PREDICTED':'ASLEEP'}</span>` : '') + `</div>`;
    }
    if(now > W0 && now < W1) bars += `<div class="nowline" style="left:${px(now)}%"></div>`;

    h += `<tr class="${isToday?'today':''}">
      <td class="dow">${dow}</td><td class="dnum">${D.d}</td>
      <td class="tm r">${D.wake ? (D.proj?'<span class="dim">':'')+hhmm(D.wake,D.off)+(D.proj?'</span>':'') : dash}</td>
      ${dots}
      <td class="tm r">${D.bed ? (D.proj?'<span class="dim">':'')+hhmm(D.bed,D.off)+(D.proj?'</span>':'') : dash}</td>
      <td class="trackcell"><div class="track">${bars}</div></td>
    </tr>`;
  }
  h += `</tbody></table>`;
  if(!aligned){
    let ax = '';
    for(let hh=0; hh<=24; hh+=4){
      const lab = hh===0?'12a':hh===12?'noon':hh===24?'12a':(hh>12?hh-12+'p':hh+'a');
      ax += `<span style="left:${(hh/24)*100}%">${lab}</span>`;
    }
    h += `<div style="display:flex"><div style="width:${30+20+56+26*5+56}px"></div>
          <div style="flex:1;position:relative"><div class="axis">${ax}</div></div></div>`;
  }
  return h;
}

/* ── render: the loop (spiral) ─────────────────────────────────────────── */
function renderSpiral(days){
  const R0 = 62, R1 = 250, S = 560, C = S/2;
  const n = days.length;
  const ang = h => (h/24)*Math.PI*2 - Math.PI/2;   // midnight at top
  const rad = i => R0 + (R1-R0)*(i/Math.max(1,n-1));
  let arcs = '', ticks = '';
  for(let hh=0; hh<24; hh+=3){
    const a = ang(hh), x = C+Math.cos(a)*(R1+16), y = C+Math.sin(a)*(R1+16);
    ticks += `<line x1="${C+Math.cos(a)*R0}" y1="${C+Math.sin(a)*R0}" x2="${C+Math.cos(a)*R1}" y2="${C+Math.sin(a)*R1}" class="sp-line" opacity=".35"/>`
          +  `<text x="${x}" y="${y}" fill="var(--ink-3)" font-size="10" text-anchor="middle" dominant-baseline="middle">${hh===0?'12a':hh===12?'noon':(hh>12?hh-12+'p':hh+'a')}</text>`;
  }
  days.forEach((D,i) => {
    if(!D.covered && !D.proj) return;                      // a gap stays a gap
    const r = rad(i);
    for(const s of D.segs){
      const h0 = (s.a - D.ds)/H, h1 = (s.b - D.ds)/H;
      const a0 = ang(h0), a1 = ang(h1);
      const large = (h1-h0) > 12 ? 1 : 0;
      const x0 = C+Math.cos(a0)*r, y0 = C+Math.sin(a0)*r;
      const x1 = C+Math.cos(a1)*r, y1 = C+Math.sin(a1)*r;
      arcs += `<path class="sp-arc" d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${r} ${r} 0 ${large} 1 ${x1.toFixed(1)} ${y1.toFixed(1)}"
        stroke="${s.proj?'var(--proj)':'var(--asleep-edge)'}" stroke-width="4.5"
        opacity="${s.proj?.45:.9}" ${s.proj?'stroke-dasharray="3 3"':''}>
        <title>${D.m+1}/${D.d} — asleep ${hhmm(s.a,D.off)} → ${hhmm(s.b,D.off)}${s.proj?' (predicted)':''}</title></path>`;
    }
  });
  const now = Date.now();
  let nowMark = '';
  const td = days.find(D => now >= D.ds && now < D.de);
  if(td){
    const r = rad(days.indexOf(td)), a = ang((now - td.ds)/H);
    nowMark = `<circle cx="${(C+Math.cos(a)*r).toFixed(1)}" cy="${(C+Math.sin(a)*r).toFixed(1)}" r="5" fill="var(--now)"><title>now</title></circle>`;
  }
  return `<svg viewBox="0 0 ${S} ${S}" width="${S}" height="${S}" role="img"
      aria-label="Each ring is one day of the month, innermost the 1st. Arcs mark sleep against a 24-hour clock, midnight at top.">
    ${ticks}<circle cx="${C}" cy="${C}" r="${R0-8}" fill="none" stroke="var(--rule)"/>
    ${arcs}${nowMark}
    <text x="${C}" y="${C}" text-anchor="middle" dominant-baseline="middle" fill="var(--ink-3)" font-size="10">1st</text>
  </svg>
  <p class="note">Innermost ring is the 1st; each ring outward is the next day. Sleep sweeps clockwise
  against a 24-hour clock with midnight at the top — the drift is the spiral.</p>`;
}

/* ── table view (accessibility: identity never colour-alone) ───────────── */
function renderTable(days){
  let h = `<table><thead><tr><th class="l">Date</th><th class="l">Wake</th><th class="l">Bed</th>
    <th class="l">Hours in bed</th><th class="l">Source</th><th class="l">Probably around for</th></tr></thead><tbody>`;
  for(const D of days){
    const src = !D.covered && !D.proj ? 'no data' : (D.proj ? 'predicted (τ)' : 'measured');
    const av = D.avail.map((a,i)=>a?MEALS[i].k:null).filter(Boolean).join(', ') || '—';
    const dur = (D.wake && D.bed) ? '' : '';
    h += `<tr><td>${D.m+1}/${D.d}</td><td>${D.wake?hhmm(D.wake,D.off):'—'}</td>
      <td>${D.bed?hhmm(D.bed,D.off):'—'}</td><td>${dur}</td><td>${src}</td>
      <td>${(!D.covered&&!D.proj)?'—':av}</td></tr>`;
  }
  return h + `</tbody></table>`;
}

/* ── shell ─────────────────────────────────────────────────────────────── */
function tzLabel(days){
  const offs = [...new Set(days.map(d=>d.off))];
  const nm = o => ({'-240':'Eastern (EDT)','-300':'Eastern (EST)','-360':'Mountain (MDT)','-420':'Mountain (MST)'}[o] || `UTC${o/60}`);
  return offs.map(o=>nm(String(o))).join(' → ');
}

function render(){
  const days = monthDays(cur.y, cur.m);
  const mn = new Date(Date.UTC(cur.y,cur.m,1)).toLocaleDateString('en-US',{month:'long',timeZone:'UTC'});
  document.getElementById('title').innerHTML = `${mn} <span class="yr">${cur.y}</span>`;
  document.title = `Rikki — ${mn} ${cur.y}`;

  const meas = days.filter(d=>d.covered && !d.proj).length;
  const proj = days.filter(d=>d.proj).length;
  const gaps = days.filter(d=>!d.covered && !d.proj).length;
  document.getElementById('note').innerHTML =
    `${meas} measured · ${proj} predicted · ${gaps} no data — times shown in ${tzLabel(days)}, the clock Rikki actually read.`
    + (proj ? ` Predictions run at τ ≈ ${TAU.toFixed(2)} h from her last measured wake.` : '');

  document.getElementById('stage').innerHTML =
    view === 'spiral' ? renderSpiral(days) : renderRows(days);
  document.getElementById('tbl').innerHTML = renderTable(days);

  document.getElementById('legend').innerHTML = `
    <span class="k"><span class="sw"></span> measured — Oura recorded it</span>
    <span class="k"><span class="sw proj"></span> predicted — projected at τ ≈ ${TAU.toFixed(2)} h</span>
    <span class="k"><span class="sw gap"></span> no data — the ring was off. Never guessed.</span>
    <span class="k"><i style="display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--m3)"></i>
      big dot = probably around · <i style="display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--m3);opacity:.4"></i> small = probably asleep</span>`;

  const u = new URL(location); u.searchParams.set('month', ymKey(cur)); u.searchParams.set('view', view);
  history.replaceState(null,'',u);
}

function step(n){ const d = new Date(Date.UTC(cur.y, cur.m + n, 1)); cur = {y:d.getUTCFullYear(), m:d.getUTCMonth()}; render(); }

/* ── boot ──────────────────────────────────────────────────────────────── */
fetch('data/sleep.json', {cache:'no-store'})
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(recs => {
    EP = recs.map(r => ({
      s:+new Date(r.bedtime_start), e:+new Date(r.bedtime_end),
      off:r.off, type:r.type
    })).filter(e => e.e > e.s).sort((a,b)=>a.s-b.s);
    NIGHTS = EP.filter(e => e.type === 'long_sleep');
    if(!NIGHTS.length) throw new Error('no long_sleep records');

    LAST = NIGHTS[NIGHTS.length-1].e;
    const fit = fitTau(NIGHTS);
    TAU = fit.tau;
    projectForward(Date.now() + 400*DAY);

    // Staleness — an archive that silently freezes is this genre's classic failure.
    const ageD = (Date.now() - LAST)/DAY;
    const st = document.getElementById('stale');
    st.textContent = ageD < 2 ? `synced ${Math.round(ageD*24)}h ago`
      : `last measured night was ${Math.round(ageD)} days ago`;
    if(ageD > 4) st.className = 'stale warn';

    const q = new URLSearchParams(location.search);
    const mq = (q.get('month')||'').match(/^(\d{4})-(\d{2})$/);
    const now = new Date();
    cur = mq ? {y:+mq[1], m:+mq[2]-1} : {y:now.getFullYear(), m:now.getMonth()};
    if(['clock','awake','spiral'].includes(q.get('view'))) view = q.get('view');
    document.querySelectorAll('[data-view]').forEach(b =>
      b.setAttribute('aria-pressed', String(b.dataset.view === view)));
    render();
  })
  .catch(e => {
    document.getElementById('stage').innerHTML =
      `<div class="empty">Couldn’t load <code>data/sleep.json</code> — ${e.message}.<br>
       <small>This page holds no data of its own, by design. It shows what the archive says, or it shows nothing.</small></div>`;
  });

document.getElementById('prev').onclick = () => step(-1);
document.getElementById('next').onclick = () => step(1);
document.getElementById('today').onclick = () => { const n = new Date(); cur = {y:n.getFullYear(), m:n.getMonth()}; render(); };
document.querySelectorAll('[data-view]').forEach(b => b.onclick = () => {
  view = b.dataset.view;
  document.querySelectorAll('[data-view]').forEach(x => x.setAttribute('aria-pressed', String(x===b)));
  render();
});
addEventListener('keydown', e => {
  if(e.key === 'ArrowLeft') step(-1);
  if(e.key === 'ArrowRight') step(1);
});
</script>
</body>
</html>
